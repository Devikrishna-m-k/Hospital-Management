<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Management System</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1"><i class="fas fa-hospital-user"></i> Hospital Management System</span>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row">
      <div class="col-12">
        <h1 class="mb-4"><i class="fas fa-home"></i> Welcome to Hospital Management</h1>
        <p id="status" class="alert alert-info mb-4">
          <i class="fas fa-spinner fa-spin"></i> Checking backend...
        </p>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <h2 class="mb-4"><i class="fas fa-th-large"></i> Modules</h2>
        <div class="row">
          <div class="col-md-6 col-lg-3 mb-3">
            <a href="doctors.html" class="card text-decoration-none text-dark h-100">
              <div class="card-body text-center">
                <i class="fas fa-user-md fa-3x mb-3" style="color: #3498db;"></i>
                <h5 class="card-title">Doctors</h5>
                <p class="card-text">Manage doctors and specializations</p>
              </div>
            </a>
          </div>

          <div class="col-md-6 col-lg-3 mb-3">
            <a href="patients.html" class="card text-decoration-none text-dark h-100">
              <div class="card-body text-center">
                <i class="fas fa-users fa-3x mb-3" style="color: #27ae60;"></i>
                <h5 class="card-title">Patients</h5>
                <p class="card-text">Manage patient information</p>
              </div>
            </a>
          </div>

          <div class="col-md-6 col-lg-3 mb-3">
            <a href="appointments.html" class="card text-decoration-none text-dark h-100">
              <div class="card-body text-center">
                <i class="fas fa-calendar-alt fa-3x mb-3" style="color: #f39c12;"></i>
                <h5 class="card-title">Appointments</h5>
                <p class="card-text">Schedule appointments</p>
              </div>
            </a>
          </div>

          <div class="col-md-6 col-lg-3 mb-3">
            <a href="bills.html" class="card text-decoration-none text-dark h-100">
              <div class="card-body text-center">
                <i class="fas fa-receipt fa-3x mb-3" style="color: #e74c3c;"></i>
                <h5 class="card-title">Bills</h5>
                <p class="card-text">Generate and manage bills</p>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center mt-5 py-4">
    <p>&copy; 2026 Hospital Management System. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("http://localhost:5000")
      .then(res => res.text())
      .then(data => {
        const statusEl = document.getElementById("status");
        statusEl.textContent = data;
        statusEl.classList.remove("alert-info");
        statusEl.classList.add("alert-success");
      })
      .catch(() => {
        const statusEl = document.getElementById("status");
        statusEl.textContent = "⚠️ Backend not reachable";
        statusEl.classList.remove("alert-info");
        statusEl.classList.add("alert-danger");
      });
  </script>

</body>
</html>
