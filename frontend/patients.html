<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="index.html" class="navbar-brand mb-0 h1"><i class="fas fa-arrow-left"></i> Back</a>
      <span class="navbar-brand mb-0 h1"><i class="fas fa-users"></i> Patients</span>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-4"><i class="fas fa-hospital-user"></i> Patients</h1>

    <div class="row">
      <div class="col-md-8">
        <h3 class="mb-3">Patient List</h3>
        <div id="patientList"></div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="fas fa-user-plus"></i> Add New Patient</h5>
          </div>
          <div class="card-body">
            <form id="addPatientForm">
              <div class="mb-3">
                <label for="name" class="form-label">Name:</label>
                <input type="text" id="name" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="age" class="form-label">Age:</label>
                <input type="number" id="age" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="gender" class="form-label">Gender:</label>
                <select id="gender" class="form-control" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone:</label>
                <input type="text" id="phone" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-success w-100"><i class="fas fa-plus"></i> Add Patient</button>
            </form>
            <div id="formMessage"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center mt-5 py-4">
    <p>&copy; 2026 Hospital Management System. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function loadPatients() {
      fetch("http://localhost:5000/patients")
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById("patientList");
          list.innerHTML = "";
          if (data.length === 0) {
            list.innerHTML = '<div class="alert alert-info">No patients found. Add one to get started!</div>';
            return;
          }
          data.forEach(patient => {
            const card = document.createElement("div");
            card.className = "card mb-3";
            card.innerHTML = `
              <div class="card-body">
                <h5 class="card-title"><i class="fas fa-user"></i> ${patient.patient_name}</h5>
                <p class="card-text">
                  <strong>Age:</strong> ${patient.age}<br>
                  <strong>Gender:</strong> ${patient.gender}<br>
                  <strong>Phone:</strong> ${patient.phone}
                </p>
              </div>
            `;
            list.appendChild(card);
          });
        })
        .catch(err => {
          document.getElementById("patientList").innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Failed to load patients</div>';
        });
    }

    document.getElementById("addPatientForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const age = parseInt(document.getElementById("age").value);
      const gender = document.getElementById("gender").value;
      const phone = document.getElementById("phone").value;

      fetch("http://localhost:5000/patients", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ patient_name: name, age, gender, phone })
      })
      .then(res => res.json())
      .then(data => {
        const msgEl = document.getElementById("formMessage");
        msgEl.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> ' + data.message + '</div>';
        setTimeout(() => msgEl.innerHTML = '', 3000);
        loadPatients();
        document.getElementById("addPatientForm").reset();
      })
      .catch(err => {
        document.getElementById("formMessage").innerHTML = '<div class="alert alert-danger"><i class="fas fa-times-circle"></i> Failed to add patient</div>';
      });
    });

    loadPatients();
  </script>

</body>
</html>
