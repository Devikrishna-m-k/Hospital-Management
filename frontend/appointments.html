<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="index.html" class="navbar-brand mb-0 h1"><i class="fas fa-arrow-left"></i> Back</a>
      <span class="navbar-brand mb-0 h1"><i class="fas fa-calendar-alt"></i> Appointments</span>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-4"><i class="fas fa-calendar-check"></i> Appointments</h1>

    <div class="row">
      <div class="col-md-8">
        <h3 class="mb-3">Appointment List</h3>
        <div id="appointmentList"></div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <div class="card-header bg-warning text-white">
            <h5 class="mb-0"><i class="fas fa-calendar-plus"></i> Add New Appointment</h5>
          </div>
          <div class="card-body">
            <form id="addAppointmentForm">
              <div class="mb-3">
                <label for="patientId" class="form-label">Patient ID:</label>
                <input type="number" id="patientId" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="doctorId" class="form-label">Doctor ID:</label>
                <input type="number" id="doctorId" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="date" class="form-label">Appointment Date:</label>
                <input type="date" id="date" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-warning w-100"><i class="fas fa-plus"></i> Add Appointment</button>
            </form>
            <div id="formMessage"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center mt-5 py-4">
    <p>&copy; 2026 Hospital Management System. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function loadAppointments() {
      fetch("http://localhost:5000/appointments")
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById("appointmentList");
          list.innerHTML = "";
          if (data.length === 0) {
            list.innerHTML = '<div class="alert alert-info">No appointments found. Schedule one to get started!</div>';
            return;
          }
          data.forEach(appointment => {
            const card = document.createElement("div");
            card.className = "card mb-3";
            card.innerHTML = `
              <div class="card-body">
                <h5 class="card-title"><i class="fas fa-calendar-alt"></i> Appointment #${appointment.appointment_id}</h5>
                <p class="card-text">
                  <strong>Patient ID:</strong> ${appointment.patient_id}<br>
                  <strong>Doctor ID:</strong> ${appointment.doctor_id}<br>
                  <strong>Date:</strong> ${new Date(appointment.appointment_date).toLocaleDateString()}
                </p>
              </div>
            `;
            list.appendChild(card);
          });
        })
        .catch(err => {
          document.getElementById("appointmentList").innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Failed to load appointments</div>';
        });
    }

    document.getElementById("addAppointmentForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const patient_id = parseInt(document.getElementById("patientId").value);
      const doctor_id = parseInt(document.getElementById("doctorId").value);
      const appointment_date = document.getElementById("date").value;

      fetch("http://localhost:5000/appointments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ patient_id, doctor_id, appointment_date })
      })
      .then(res => res.json())
      .then(data => {
        const msgEl = document.getElementById("formMessage");
        msgEl.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> ' + data.message + '</div>';
        setTimeout(() => msgEl.innerHTML = '', 3000);
        loadAppointments();
        document.getElementById("addAppointmentForm").reset();
      })
      .catch(err => {
        document.getElementById("formMessage").innerHTML = '<div class="alert alert-danger"><i class="fas fa-times-circle"></i> Failed to add appointment</div>';
      });
    });

    loadAppointments();
  </script>

</body>
</html>
