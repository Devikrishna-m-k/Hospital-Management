<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctors</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="index.html" class="navbar-brand mb-0 h1"><i class="fas fa-arrow-left"></i> Back</a>
      <span class="navbar-brand mb-0 h1"><i class="fas fa-user-md"></i> Doctors</span>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-4"><i class="fas fa-stethoscope"></i> Doctors</h1>

    <div class="row">
      <div class="col-md-12">
        <h3 class="mb-3">Doctor List</h3>
        <div id="doctorList"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center mt-5 py-4">
    <p>&copy; 2026 Hospital Management System. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("http://localhost:5000/doctors")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("doctorList");
        if (data.length === 0) {
          list.innerHTML = '<div class="alert alert-info">No doctors found</div>';
          return;
        }
        data.forEach(doctor => {
          const card = document.createElement("div");
          card.className = "card mb-3";
          card.innerHTML = `
            <div class="card-body">
              <h5 class="card-title"><i class="fas fa-user-md"></i> ${doctor.doctor_name}</h5>
              <p class="card-text"><strong>Specialization:</strong> ${doctor.specialization}</p>
              <p class="card-text"><small class="text-muted">Department ID: ${doctor.department_id}</small></p>
            </div>
          `;
          list.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById("doctorList").innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Failed to load doctors</div>';
      });
  </script>

</body>
</html>
