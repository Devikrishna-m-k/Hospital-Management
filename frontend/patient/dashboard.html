<!DOCTYPE html>
<html lang="en" data-theme="lemonade">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard | MedCore</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>

<body class="bg-base-200">

  <div class="drawer lg:drawer-open">
    <input id="patient-drawer" type="checkbox" class="drawer-toggle" />
    
    <div class="drawer-content flex flex-col min-h-screen">
      
      <div class="navbar bg-base-100/80 backdrop-blur-md sticky top-0 z-30 border-b border-base-200 px-4 sm:px-8">
        <div class="flex-none lg:hidden">
          <label for="patient-drawer" aria-label="open sidebar" class="btn btn-square btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          </label>
        </div>
        
        <div class="flex-1 flex items-center gap-2">
          <a href="../index.html" class="btn btn-ghost btn-sm font-semibold">← Back</a>
          <h1 class="text-xl sm:text-2xl font-bold tracking-tight text-base-content hidden sm:block">Patient Dashboard</h1>
        </div>
        
        <div class="flex-none gap-4">
          <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <ul tabindex="0" class="mt-3 z-[1] p-2 shadow-lg menu menu-sm dropdown-content bg-base-100 rounded-box w-52 border border-base-200">
              <li><a>Profile Settings</a></li>
              <li><a class="text-error" href="../index.html">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>

      <main class="flex-1 p-6 sm:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="stat bg-base-100 rounded-3xl shadow-sm border border-base-200 hover:-translate-y-1 hover:shadow-md transition-all duration-300">
            <div class="stat-figure text-secondary bg-secondary/10 p-4 rounded-2xl">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
            </div>
            <div class="stat-title font-medium">Total Appointments</div>
            <div class="stat-value text-3xl font-bold mt-1" id="totalAppointments">-</div>
          </div>

          <div class="stat bg-base-100 rounded-3xl shadow-sm border border-base-200 hover:-translate-y-1 hover:shadow-md transition-all duration-300">
            <div class="stat-figure text-primary bg-primary/10 p-4 rounded-2xl">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <div class="stat-title font-medium">Upcoming Appointments</div>
            <div class="stat-value text-3xl font-bold mt-1" id="upcomingAppointments">-</div>
          </div>

          <div class="stat bg-base-100 rounded-3xl shadow-sm border border-base-200 hover:-translate-y-1 hover:shadow-md transition-all duration-300">
            <div class="stat-figure text-accent bg-accent/10 p-4 rounded-2xl">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z" /></svg>
            </div>
            <div class="stat-title font-medium">Total Bills</div>
            <div class="stat-value text-3xl font-bold mt-1" id="totalBills">-</div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="bg-base-100 rounded-3xl shadow-sm border border-base-200 p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-lg font-bold">My Appointments</h2>
              <button class="btn btn-sm btn-primary btn-outline rounded-full px-4">Book New</button>
            </div>
            <div class="overflow-x-auto flex-1">
              <table class="table w-full">
                <thead>
                  <tr class="text-base-content/60 border-b-base-200">
                    <th>Date & Time</th>
                    <th>Doctor / Dept</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="appointmentsTable"></tbody>
              </table>
            </div>
          </div>

          <div class="bg-base-100 rounded-3xl shadow-sm border border-base-200 p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-lg font-bold">My Bills</h2>
              <button class="btn btn-sm btn-ghost text-secondary">History</button>
            </div>
            <div id="billsList" class="flex flex-col gap-3 flex-1 overflow-y-auto"></div>
          </div>
        </div>

      </main>
    </div>
    
    <div class="drawer-side z-40">
      <label for="patient-drawer" aria-label="close sidebar" class="drawer-overlay"></label> 
      <div class="menu p-4 w-72 min-h-full bg-base-100 text-base-content border-r border-base-200 flex flex-col gap-2">
        
        <div class="flex items-center gap-3 px-4 py-6 mb-4">
          <div class="bg-secondary/10 text-secondary p-2 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
              <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 7.5a.75.75 0 00-1.5 0v3.75H7.5a.75.75 0 000 1.5h3.75v3.75a.75.75 0 001.5 0v-3.75h3.75a.75.75 0 000-1.5h-3.75V7.5z" clip-rule="evenodd" />
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight">Med<span class="text-secondary">Core</span> Patient</span>
        </div>

        <ul class="menu w-full px-0 gap-1 font-medium">
          <li>
            <a class="active bg-secondary/10 text-secondary py-3 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>
              Dashboard
            </a>
          </li>
          <li>
            <a class="py-3 rounded-xl hover:bg-base-200">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
              My Appointments
            </a>
          </li>
          <li>
            <a class="py-3 rounded-xl hover:bg-base-200">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
              Bills
            </a>
          </li>
        </ul>

        <div class="mt-auto pb-4">
          <a href="../index.html" class="btn btn-outline btn-error w-full rounded-xl hover:-translate-y-1 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>
            Logout
          </a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
